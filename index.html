        // Core Layout Management State Controller
        function switchCategory(categoryKey) {
            currentActiveCategoryKey = categoryKey;

            // Update layout button styling properties
            document.querySelectorAll('#category-buttons button').forEach(b => {
                b.className = "p-3 rounded-xl border text-sm font-medium transition text-left bg-white hover:bg-gray-100 border-gray-200 text-gray-700 cursor-pointer";
            });
            
            const targetBtn = document.getElementById(`btn-nav-${categoryKey}`);
            if (targetBtn) {
                targetBtn.className = "p-3 rounded-xl border text-sm font-medium transition text-left bg-blue-600 text-white border-blue-600 shadow-sm cursor-pointer";
            }

            processDataRender();
        }

        // Live Input Processing Handle
        function handleSearch() {
            currentSearchString = document.getElementById('directory-search').value.toLowerCase().trim();
            processDataRender();
        }

        // Render Orchestrator
        function processDataRender() {
            const currentCategoryData = aiDatabase[currentActiveCategoryKey];

            // Filter sets individually against global search string variables
            const filteredFree = currentCategoryData.free.filter(t => t.name.toLowerCase().includes(currentSearchString));
            const filteredPaid = currentCategoryData.paid.filter(t => t.name.toLowerCase().includes(currentSearchString));

            // Set dynamic text element count markers
            document.getElementById('free-counter').innerText = `${filteredFree.length} registered`;
            document.getElementById('paid-counter').innerText = `${filteredPaid.length} registered`;

            renderCards(filteredFree, 'free-tools-container', 'border-emerald-100 hover:border-emerald-300 bg-white');
            renderCards(filteredPaid, 'paid-tools-container', 'border-blue-100 hover:border-blue-300 bg-white');
        }

        // Card HTML Builder Implementation (With Embedded YouTube Search Routing)
        function renderCards(toolsList, containerId, customStyles) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if(!toolsList || toolsList.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 px-4 bg-gray-50/50 rounded-xl border border-dashed border-gray-200">
                        <p class="text-gray-400 text-sm">No assets match search parameter.</p>
                    </div>`;
                return;
            }

            toolsList.forEach(tool => {
                // Dynamically build a trusted search query targeting top YouTube industry influencers
                const youtubeTutorialSearchQuery = `https://www.youtube.com/results?search_query=${encodeURIComponent(tool.name)}+AI+tool+tutorial+guide`;

                const card = document.createElement('div');
                card.className = `p-5 rounded-xl border transition shadow-sm ${customStyles}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <h3 class="text-lg font-bold tracking-tight text-gray-900">${tool.name}</h3>
                        <a href="${tool.link}" target="_blank" class="text-xs font-semibold text-blue-600 hover:underline flex items-center shrink-0">
                            Visit Site ↗
                        </a>
                    </div>
                    <p class="text-sm text-gray-600 mt-2 leading-relaxed mb-4">${tool.desc}</p>
                    <div class="pt-3 border-t border-gray-100 flex items-center justify-between">
                        <span class="text-[11px] font-medium text-gray-400">Tutorial & Reviews:</span>
                        <a href="${youtubeTutorialSearchQuery}" target="_blank" class="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-md transition duration-150">
                            <i class="fa-brands fa-youtube text-sm"></i> Watch Tutorial ↗
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
