    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --tag-free: #10b981;
            --tag-paid: #f59e0b;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .controls-container {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-bar {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .directory-section {
            max-width: 1200px;
            margin: 0 auto 3rem auto;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-count {
            font-size: 1rem;
            background-color: var(--border-color);
            color: var(--text-secondary);
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .tool-name {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .tool-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: bold;
        }

        .tag-free {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--tag-free);
        }

        .tag-paid {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--tag-paid);
        }

        .tool-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tool-cat {
            font-size: 0.85rem;
            color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
        }

        .tool-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .tool-link:hover {
            color: var(--accent-color);
        }

        .no-results {
            text-align: center;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
        }
    </style>

                    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    activeCategoryFilter = key;
                    renderDirectory();
                });
                container.appendChild(btn);
            });
        }

        // Render Directory Lists
        function renderDirectory() {
            const searchQuery = document.getElementById("searchBar").value.toLowerCase();
            const freeGrid = document.getElementById("freeToolsGrid");
            const paidGrid = document.getElementById("paidToolsGrid");

            // Clear previous elements
            freeGrid.innerHTML = "";
            paidGrid.innerHTML = "";

            let freeCount = 0;
            let paidCount = 0;

            toolDataset.forEach(tool => {
                // Category validation check
                const matchesCategory = activeCategoryFilter === "all" || tool.category === activeCategoryFilter;
                
                // Search validation check
                const matchesSearch = tool.name.toLowerCase().includes(searchQuery) || 
                                      tool.description.toLowerCase().includes(searchQuery) ||
                                      tool.category.toLowerCase().includes(searchQuery);

                if (matchesCategory && matchesSearch) {
                    // Create tool card element
                    const card = document.createElement("div");
                    card.className = "tool-card";
                    
                    const isPremium = tool.pricing.toLowerCase() === 'paid';
                    const tagClass = isPremium ? 'tag-paid' : 'tag-free';
                    const displayPricing = isPremium ? 'Premium' : tool.pricing;

                    card.innerHTML = `
                        <div>
                            <div class="tool-header">
                                <div class="tool-name">${tool.name}</div>
                                <span class="tool-tag ${tagClass}">${displayPricing}</span>
                            </div>
                            <p class="tool-desc">${tool.description}</p>
                        </div>
                        <div class="tool-footer">
                            <span class="tool-cat">${tool.category}</span>
                            <a href="${tool.link}" target="_blank" class="tool-link">Visit Website ↗</a>
                        </div>
                    `;

                    // Route card to correct layout section
                    if (isPremium) {
                        paidGrid.appendChild(card);
                        paidCount++;
                    } else {
                        freeGrid.appendChild(card);
                        freeCount++;
                    }
                }
            });

            // Handle empty results display
            if (freeCount === 0) {
                freeGrid.innerHTML = `<div class="no-results">No free or freemium tools match your current search criteria.</div>`;
            }
            if (paidCount === 0) {
                paidGrid.innerHTML = `<div class="no-results">No premium tools match your current search criteria.</div>`;
            }

            // Update item counters layout values
            document.getElementById("freeCount").innerText = freeCount;
            document.getElementById("paidCount").innerText = paidCount;
        }

        // Add Input Listener for Real-time Search functionality
        document.getElementById("searchBar").addEventListener("input", renderDirectory);

        // Run Initial Setup Loops
        initFilters();
        renderDirectory();
    </script>
</body>
</html>
